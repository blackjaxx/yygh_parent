#????json??????????
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8

#????mapper xml?????????
mybatis-plus.mapper-locations=classpath:com/atguigu/cmn/mapper/xml/*.xml
# ????mybatis plus???sql???
